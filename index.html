// hooks via React global

/* ════════════════════════════════════════════
   STYLES
════════════════════════════════════════════ */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--bg2:#0C1120;--bg3:#111827;--bg4:#1A2235;
  --border:#1C2840;--border2:#243252;
  --amber:#F59E0B;--amber2:#FCD34D;--amberdim:rgba(245,158,11,0.1);
  --blue:#3B82F6;--bluedim:rgba(59,130,246,0.1);
  --green:#10B981;--greendim:rgba(16,185,129,0.1);
  --red:#EF4444;--reddim:rgba(239,68,68,0.1);
  --purple:#8B5CF6;--purpledim:rgba(139,92,246,0.1);
  --teal:#14B8A6;--tealdim:rgba(20,184,166,0.1);
  --text:#E2E8F0;--text2:#94A3B8;--text3:#475569;--text4:#334155;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;background:var(--bg);flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:20px}

/* Logo */
.logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--amber),#D97706);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--bg);flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;line-height:1.2}
.logo-tag{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}

/* Sidebar nav */
.nav-grp{padding:12px 0 4px}
.nav-grp-label{padding:0 16px 4px;font-size:9.5px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;color:var(--text3);font-size:12.5px;font-weight:500;transition:.12s;border-left:2px solid transparent;white-space:nowrap}
.nav-item:hover{color:var(--text2);background:rgba(255,255,255,.02)}
.nav-item.on{color:var(--amber);background:var(--amberdim);border-left-color:var(--amber)}
.nav-ico{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:8px}
.nb-red{background:var(--red);color:#fff}
.nb-amber{background:var(--amberdim);color:var(--amber)}
.nb-blue{background:var(--bluedim);color:var(--blue)}
.nb-green{background:var(--greendim);color:var(--green)}

.sb-foot{margin-top:auto;border-top:1px solid var(--border);padding:12px 16px}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.uname{font-size:12px;font-weight:600;color:var(--text2)}
.urole{font-size:10px;color:var(--text3)}

/* Role switcher */
.role-sw{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.rsw-btn{padding:4px 9px;border-radius:5px;font-size:10.5px;font-weight:700;cursor:pointer;border:none;font-family:'IBM Plex Sans',sans-serif;transition:.12s;color:var(--text3);background:transparent;letter-spacing:.02em}
.rsw-btn.on{background:var(--amber);color:var(--bg)}
.rsw-btn:hover:not(.on){color:var(--text2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.12s;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap}
.btn-primary{background:var(--amber);color:var(--bg)}
.btn-primary:hover{background:var(--amber2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.03);border-color:var(--border2);color:var(--text)}
.btn-green{background:var(--greendim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.btn-red{background:var(--reddim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-blue{background:var(--bluedim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.btn-purple{background:var(--purpledim);color:var(--purple);border:1px solid rgba(139,92,246,.2)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10.5px}

/* Search */
.srch{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:0 10px;height:32px}
.srch input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:'IBM Plex Sans',sans-serif;width:180px}
.srch input::placeholder{color:var(--text4)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px}
.card-hd{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.card-bd{padding:16px}

/* Stat cards */
.sg{display:grid;gap:12px;margin-bottom:18px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sg3{grid-template-columns:repeat(3,1fr)}
.sg2{grid-template-columns:repeat(2,1fr)}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:-12px;right:-12px;width:60px;height:60px;border-radius:50%;opacity:.07}
.sc-a::after{background:var(--amber)}
.sc-b::after{background:var(--blue)}
.sc-g::after{background:var(--green)}
.sc-p::after{background:var(--purple)}
.sc-r::after{background:var(--red)}
.sc-t::after{background:var(--teal)}
.sc-lbl{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.sc-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px}
.sc-delta{font-size:11px;font-weight:600}
.delta-u{color:var(--green)}
.delta-d{color:var(--red)}
.delta-n{color:var(--text3)}
.sc-ico{position:absolute;top:14px;right:14px;font-size:17px;opacity:.4}

/* Grid layouts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:12px}
.g31{display:grid;grid-template-columns:3fr 1fr;gap:12px}
.mb12{margin-bottom:12px}
.mb18{margin-bottom:18px}

/* Table */
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(28,40,64,.6);transition:.1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.012)}
tbody td{padding:10px 12px;font-size:12.5px;color:var(--text2);vertical-align:middle}
.tb{font-weight:600;color:var(--text)}
.tamb{color:var(--amber);font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:11.5px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.bg{background:var(--greendim);color:var(--green)}.bg::before{background:var(--green)}
.ba{background:var(--amberdim);color:var(--amber)}.ba::before{background:var(--amber)}
.br{background:var(--reddim);color:var(--red)}.br::before{background:var(--red)}
.bb{background:var(--bluedim);color:var(--blue)}.bb::before{background:var(--blue)}
.bp{background:var(--purpledim);color:var(--purple)}.bp::before{background:var(--purple)}
.bt{background:var(--tealdim);color:var(--teal)}.bt::before{background:var(--teal)}
.bgr{background:rgba(100,116,139,.1);color:#64748B}.bgr::before{background:#64748B}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:.12s;font-family:'IBM Plex Sans',sans-serif}
.chip:hover{color:var(--text2);border-color:var(--border2)}
.chip.on{background:var(--amberdim);border-color:rgba(245,158,11,.35);color:var(--amber)}

/* Form */
.fg{margin-bottom:12px}
.fl{font-size:10.5px;font-weight:700;color:var(--text3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12.5px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:.12s}
.fi:focus{border-color:var(--amber)}
.fi::placeholder{color:var(--text4)}
select.fi option{background:var(--bg)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s}
.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.tab:hover:not(.on){color:var(--text2)}

/* Overlay / Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:560px;max-height:90vh;overflow-y:auto}
.modal-lg{width:700px}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px}
.modal-section{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* Progress */
.prog{background:var(--border);border-radius:3px;height:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}

/* Timeline */
.tl{padding-left:20px;position:relative}
.tl::before{content:'';position:absolute;left:6px;top:5px;bottom:5px;width:1px;background:var(--border)}
.tl-step{position:relative;padding-bottom:16px}
.tl-step:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-17px;top:2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-dot.cur{background:var(--amber);border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.tl-lbl{font-size:12.5px;font-weight:600}
.tl-desc{font-size:11px;color:var(--text3);margin-top:2px}
.tl-time{font-size:10px;color:var(--text4);margin-top:2px;font-family:'IBM Plex Mono',monospace}

/* Activity */
.act{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid rgba(28,40,64,.5)}
.act:last-child{border-bottom:none}
.act-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.act-txt{font-size:12px;color:var(--text3);line-height:1.5}
.act-txt strong{color:var(--text2);font-weight:600}
.act-time{font-size:10px;color:var(--text4);margin-top:1px;font-family:'IBM Plex Mono',monospace}

/* Label print */
.label-card{background:white;color:#111;border-radius:10px;padding:18px;font-family:'IBM Plex Mono',monospace}
.label-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:10px}
.label-co{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#111}
.label-id{font-size:22px;font-weight:700;letter-spacing:.1em;color:#111}
.label-row{display:flex;gap:20px;margin-bottom:8px}
.label-field{flex:1}
.label-field-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#666;margin-bottom:2px}
.label-field-val{font-size:13px;font-weight:700;color:#111}
.label-barcode{text-align:center;margin-top:10px;border-top:1px solid #ddd;padding-top:10px;font-size:9px;letter-spacing:.2em;color:#333}

/* Route card */
.route-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px}
.route-card.pickup{border-left:3px solid var(--amber)}
.route-card.dropoff{border-left:3px solid var(--blue)}
.route-card.done{border-left:3px solid var(--green);opacity:.6}

/* Automation trigger */
.trigger-card{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px}
.trigger-arrow{color:var(--amber);font-weight:700;margin:0 6px}

/* Office role indicator */
.role-pill{padding:6px 12px;border-radius:7px;margin:10px 16px;font-size:11px;font-weight:700}

/* Alerts */
.alert{border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.alert-a{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);color:#D97706}
.alert-g{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);color:#059669}
.alert-r{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#DC2626}
.alert-b{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);color:#2563EB}

/* Map placeholder */
.map-ph{background:var(--bg);border:1px solid var(--border);border-radius:8px;height:140px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.map-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(28,40,64,.5) 0,rgba(28,40,64,.5) 1px,transparent 1px,transparent 26px),repeating-linear-gradient(90deg,rgba(28,40,64,.5) 0,rgba(28,40,64,.5) 1px,transparent 1px,transparent 26px)}
.map-pin{position:absolute;font-size:16px;animation:pp 2s ease-in-out infinite}
@keyframes pp{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Sparkline */
.spark{display:flex;align-items:flex-end;gap:2px;height:32px}
.spb{flex:1;border-radius:2px 2px 0 0;min-width:5px;opacity:.65;transition:.2s}
.spb:hover{opacity:1}

/* Utils */
.row{display:flex;align-items:center}
.g6{gap:6px}
.g10{gap:10px}
.g14{gap:14px}
.mla{margin-left:auto}
.mut{color:var(--text3);font-size:11.5px}
.xs{font-size:10.5px}
.mono{font-family:'IBM Plex Mono',monospace}
.divider{height:1px;background:var(--border);margin:12px 0}
.tag{display:inline-block;background:var(--amberdim);color:var(--amber);font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px}
.tag-b{background:var(--bluedim);color:var(--blue)}
.tag-g{background:var(--greendim);color:var(--green)}
.tag-p{background:var(--purpledim);color:var(--purple)}
.nd::after{content:'';position:absolute;top:-2px;right:-2px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg)}
.nd{position:relative}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;flex:1}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .25s ease both}
.mix-bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(28,40,64,.6)}
.mix-bar-row:last-child{border-bottom:none}
.batch-card{background:linear-gradient(135deg,rgba(245,158,11,.07),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.2);border-radius:11px;padding:16px}
.cust-hero{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 60%,rgba(245,158,11,.04) 100%);border:1px solid var(--border);border-radius:13px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.cust-hero::after{content:'🌎';position:absolute;right:22px;top:50%;transform:translateY(-50%);font-size:56px;opacity:.06}
.payment-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
`;
